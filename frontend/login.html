<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CodeAlpha Store</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F5F3FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 0 2rem;
            box-shadow: 0 2px 20px rgba(139, 92, 246, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: #6D28D9;
        }

        .logo i {
            color: #8B5CF6;
        }

        .logo span {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-links a {
            color: #4a4a6a;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #8B5CF6;
            background: rgba(139, 92, 246, 0.08);
        }

        .btn-outline {
            border: 2px solid #8B5CF6 !important;
            background: transparent !important;
            color: #8B5CF6 !important;
        }

        .btn-outline:hover {
            background: #8B5CF6 !important;
            color: white !important;
        }

        /* Auth Section */
        .auth-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            background: white;
            border-radius: 24px;
            padding: 40px 36px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.06);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-container h2 {
            font-size: 28px;
            font-weight: 800;
            color: #1F2937;
            text-align: center;
            margin-bottom: 4px;
        }

        .auth-container .subtitle {
            text-align: center;
            color: #6B7280;
            font-size: 15px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group label i {
            color: #8B5CF6;
            margin-right: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: #FAFAFA;
            color: #1F2937;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: white;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0 24px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #6B7280;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #8B5CF6;
            cursor: pointer;
        }

        .form-options a {
            color: #8B5CF6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .form-options a:hover {
            color: #6D28D9;
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-btn {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            color: #6B7280;
        }

        .auth-link a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        #auth-message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        #auth-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #059669;
        }

        #auth-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #DC2626;
        }

        footer {
            background: #1a1a2e;
            color: #8a8ab0;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        footer i {
            color: #8B5CF6;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .auth-container {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-store"></i> <span>CodeAlpha</span> Store</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
                <a href="login.html" class="active">Login</a>
                <a href="register.html" class="btn-outline">Register</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <h2>Welcome Back 👋</h2>
            <p class="subtitle">Login to continue shopping</p>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required />
                </div>
                <div class="form-options">
                    <label><input type="checkbox" checked /> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn auth-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
                <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
            </form>

            <div id="auth-message"></div>
        </div>
    </section>

    <footer>&copy; 2026 <i class="fas fa-heart"></i> CodeAlpha Store. All rights reserved.</footer>

    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.querySelectorAll('#cart-count').forEach(el => el.textContent = count);
        }
        document.addEventListener('DOMContentLoaded', updateCartCount);

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('auth-message');

            // Simple validation - using localStorage for demo
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('user', JSON.stringify({ name: user.name, email: user.email }));
                localStorage.setItem('token', 'fake-jwt-token');
                msg.className = 'success';
                msg.textContent = '✅ Login successful! Redirecting...';
                msg.style.display = 'block';
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                msg.className = 'error';
                msg.textContent = '❌ Invalid email or password. Please try again.';
                msg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
