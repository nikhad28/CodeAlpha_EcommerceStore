<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - CodeAlpha Store</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F5F3FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: white;
            padding: 0 2rem;
            box-shadow: 0 2px 20px rgba(139, 92, 246, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: #6D28D9;
        }

        .logo i {
            color: #8B5CF6;
        }

        .logo span {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-links a {
            color: #4a4a6a;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #8B5CF6;
            background: rgba(139, 92, 246, 0.08);
        }

        .btn-outline {
            border: 2px solid #8B5CF6 !important;
            background: transparent !important;
            color: #8B5CF6 !important;
        }

        .btn-outline:hover {
            background: #8B5CF6 !important;
            color: white !important;
        }

        .auth-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            background: white;
            border-radius: 24px;
            padding: 40px 36px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.06);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-container h2 {
            font-size: 28px;
            font-weight: 800;
            color: #1F2937;
            text-align: center;
            margin-bottom: 4px;
        }

        .auth-container .subtitle {
            text-align: center;
            color: #6B7280;
            font-size: 15px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group label i {
            color: #8B5CF6;
            margin-right: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: #FAFAFA;
            color: #1F2937;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: white;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
        }

        .password-strength {
            height: 4px;
            border-radius: 4px;
            margin-top: 8px;
            background: #E5E7EB;
            transition: all 0.3s ease;
        }

        .password-strength.weak {
            width: 33%;
            background: #EF4444;
        }
        .password-strength.medium {
            width: 66%;
            background: #F59E0B;
        }
        .password-strength.strong {
            width: 100%;
            background: #10B981;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-btn {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            color: #6B7280;
        }

        .auth-link a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .terms-text {
            text-align: center;
            font-size: 13px;
            color: #9CA3AF;
            margin-top: 16px;
        }

        .terms-text a {
            color: #8B5CF6;
            text-decoration: none;
        }

        #auth-message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        #auth-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #059669;
        }

        #auth-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #DC2626;
        }

        footer {
            background: #1a1a2e;
            color: #8a8ab0;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        footer i {
            color: #8B5CF6;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .auth-container {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-store"></i> <span>CodeAlpha</span> Store</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
                <a href="login.html" class="btn-outline">Login</a>
                <a href="register.html" class="active">Register</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <h2>Create Account ✨</h2>
            <p class="subtitle">Join us and start shopping!</p>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Create password (min 6)" required minlength="6" oninput="checkPasswordStrength(this.value)" />
                    <div class="password-strength" id="password-strength"></div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required oninput="checkPasswordMatch(this.value)" />
                    <div id="password-match-hint" style="font-size:13px;margin-top:6px;color:#6B7280;">
                        <i class="fas fa-info-circle"></i> Re-enter your password to confirm
                    </div>
                </div>
                <button type="submit" class="btn auth-btn"><i class="fas fa-user-plus"></i> Create Account</button>
                <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
                <div class="terms-text">By creating an account, you agree to our <a href="#">Terms of Service</a></div>
            </form>

            <div id="auth-message"></div>
        </div>
    </section>

    <footer>&copy; 2026 <i class="fas fa-heart"></i> CodeAlpha Store. All rights reserved.</footer>

    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.querySelectorAll('#cart-count').forEach(el => el.textContent = count);
        }
        document.addEventListener('DOMContentLoaded', updateCartCount);

        function checkPasswordStrength(password) {
            const bar = document.getElementById('password-strength');
            if (password.length === 0) { bar.className = 'password-strength'; return; }
            if (password.length < 4) bar.className = 'password-strength weak';
            else if (password.length < 8) bar.className = 'password-strength medium';
            else bar.className = 'password-strength strong';
        }

        function checkPasswordMatch(confirm) {
            const password = document.getElementById('password').value;
            const hint = document.getElementById('password-match-hint');
            if (confirm.length === 0) {
                hint.innerHTML = '<i class="fas fa-info-circle"></i> Re-enter your password to confirm';
                hint.style.color = '#6B7280';
                return;
            }
            if (password === confirm) {
                hint.innerHTML = '<i class="fas fa-check-circle" style="color:#10B981;"></i> Passwords match!';
                hint.style.color = '#10B981';
            } else {
                hint.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#EF4444;"></i> Passwords do not match';
                hint.style.color = '#EF4444';
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const msg = document.getElementById('auth-message');

            if (password !== confirm) {
                msg.className = 'error';
                msg.textContent = '❌ Passwords do not match!';
                msg.style.display = 'block';
                return;
            }

            // Save to localStorage
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === email)) {
                msg.className = 'error';
                msg.textContent = '❌ Email already registered!';
                msg.style.display = 'block';
                return;
            }

            users.push({ name, email, password });
            localStorage.setItem('users', JSON.stringify(users));

            msg.className = 'success';
            msg.textContent = '✅ Registration successful! Redirecting to login...';
            msg.style.display = 'block';

            setTimeout(() => window.location.href = 'login.html', 1500);
        }
    </script>
</body>
</html>
