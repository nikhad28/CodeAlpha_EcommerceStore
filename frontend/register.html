<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CodeAlpha Store</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <h1>🛍️ CodeAlpha Store</h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links">
                    <a href="login.html">Login</a>
                    <a href="register.html" class="active">Register</a>
                </div>
                <div id="user-info" style="display:none;">
                    <span id="user-name"></span>
                    <button onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <h2>Register</h2>
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create password (min 6)" required minlength="6">
                </div>
                <button type="submit" class="btn auth-btn">Register</button>
                <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
            </form>
            <div id="auth-message"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 CodeAlpha Store. All rights reserved.</p>
    </footer>

    <script src="scripts/app.js"></script>
    <script src="scripts/auth.js"></script>
</body>
</html>
